<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>slot-data-tool 管理画面</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
      background: #f0f2f5;
      color: #222;
      padding: 24px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: #1a1a2e;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 24px;
    }

    /* ボタンエリア */
    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }

    .action-btn {
      padding: 12px 22px;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      color: #fff;
    }
    .action-btn:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
    .action-btn:active:not(:disabled) { transform: translateY(0); }
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-update   { background: #2563eb; }
    .btn-backfill { background: #7c3aed; }
    .btn-rebuild  { background: #0891b2; }
    .btn-publish  { background: #059669; }

    /* ステータスバー */
    #status-bar {
      display: none;
      align-items: center;
      gap: 10px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }
    #status-bar.running { border-color: #3b82f6; background: #eff6ff; }
    #status-bar.done    { border-color: #10b981; background: #f0fdf4; }
    #status-bar.error   { border-color: #ef4444; background: #fef2f2; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #bfdbfe;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ログエリア */
    #log-container {
      background: #0f172a;
      border-radius: 10px;
      overflow: hidden;
    }
    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: #1e293b;
      font-size: 0.8rem;
      color: #94a3b8;
    }
    #clear-btn {
      background: none;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
    }
    #clear-btn:hover { background: #334155; }

    #log {
      padding: 14px 16px;
      height: 420px;
      overflow-y: auto;
      font-family: "SF Mono", "Menlo", "Courier New", monospace;
      font-size: 0.8rem;
      line-height: 1.6;
      color: #e2e8f0;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #log .log-line         { display: block; }
    #log .log-line.success { color: #4ade80; }
    #log .log-line.error   { color: #f87171; font-weight: bold; }
    #log .log-line.warn    { color: #fbbf24; }
    #log .log-line.info    { color: #93c5fd; }
    #log .log-line.cmd     { color: #c084fc; font-style: italic; }
    #log .log-line.empty   { display: block; height: 0.5em; }
  </style>
</head>
<body>

  <h1>🎰 slot-data-tool 管理画面</h1>
  <p class="subtitle">ボタンを押すと、データ取得・更新・公開を実行できます（ローカル専用）</p>

  <div class="buttons">
    <button class="action-btn btn-update"   onclick="runAction('update_all')">📥 全店舗更新</button>
    <button class="action-btn btn-backfill" onclick="runAction('backfill_1')">🔄 昨日分バックフィル</button>
    <button class="action-btn btn-backfill" onclick="runAction('backfill_3')">🔄 3日分バックフィル</button>
    <button class="action-btn btn-rebuild"  onclick="runAction('rebuild_30d')">📊 30日データ再生成</button>
    <button class="action-btn btn-publish"  onclick="runAction('publish')">🚀 GitHubへ公開</button>
  </div>

  <!-- ステータスバー -->
  <div id="status-bar">
    <div class="spinner" id="spinner"></div>
    <div>
      <span id="status-text"></span>
      <span id="status-sub" style="font-size:0.8rem;color:#64748b;margin-left:8px;"></span>
    </div>
  </div>

  <!-- ログ表示 -->
  <div id="log-container">
    <div class="log-header">
      <span>実行ログ</span>
      <button id="clear-btn" onclick="clearLog()">クリア</button>
    </div>
    <div id="log"><span class="log-line info">-- ボタンを押すとここにログが表示されます --</span></div>
  </div>

  <script>
    const logEl = document.getElementById('log');
    const statusBar = document.getElementById('status-bar');
    const statusText = document.getElementById('status-text');
    const statusSub = document.getElementById('status-sub');
    const spinner = document.getElementById('spinner');
    let currentEs = null;  // EventSource
    let logLineCount = 0;

    function appendLog(text, cls) {
      const span = document.createElement('span');
      span.className = 'log-line' + (cls ? ' ' + cls : '');
      span.textContent = text;
      logEl.appendChild(span);
      logEl.appendChild(document.createTextNode('\n'));
      logEl.scrollTop = logEl.scrollHeight;
      if (cls !== 'empty') {
        logLineCount++;
        if (statusSub && document.getElementById('status-bar').classList.contains('running')) {
          statusSub.textContent = `${logLineCount} 行`;
        }
      }
    }

    function clearLog() {
      logEl.innerHTML = '';
      logLineCount = 0;
    }

    function classifyLine(line) {
      if (!line) return 'empty';
      if (/^\[CMD\]/.test(line)) return 'cmd';
      if (/^\[INFO\]/.test(line)) return 'info';
      if (/✓|✅|完了|成功|DONE/i.test(line)) return 'success';
      if (/✗|❌|error|エラー|失敗|FAIL|traceback/i.test(line)) return 'error';
      if (/warn|警告|⚠/.test(line)) return 'warn';
      if (/^\[|step|──|={3,}|▶/.test(line)) return 'info';
      return '';
    }

    function setStatus(state, label, sub) {
      statusBar.style.display = 'flex';
      statusBar.className = state;
      statusText.textContent = label;
      statusSub.textContent = sub || '';
      spinner.style.display = state === 'running' ? 'block' : 'none';
    }

    function setButtonsDisabled(disabled) {
      document.querySelectorAll('.action-btn').forEach(b => b.disabled = disabled);
    }

    async function runAction(actionId) {
      // 前の SSE があれば閉じる
      if (currentEs) { currentEs.close(); currentEs = null; }

      clearLog();
      setButtonsDisabled(true);
      setStatus('running', '起動中...', '');

      const labels = {
        update_all:  '全店舗更新',
        backfill_1:  '昨日分バックフィル',
        backfill_3:  '3日分バックフィル',
        rebuild_30d: '30日データ再生成',
        publish:     'GitHubへ公開',
      };

      // ジョブ開始
      let res;
      try {
        res = await fetch(`/run/${actionId}`, { method: 'POST' });
      } catch(e) {
        appendLog('サーバーに接続できません: ' + e, 'error');
        setStatus('error', 'エラー');
        setButtonsDisabled(false);
        return;
      }

      const data = await res.json();
      if (!res.ok) {
        appendLog('エラー: ' + (data.error || res.statusText), 'error');
        setStatus('error', 'エラー');
        setButtonsDisabled(false);
        return;
      }

      const jobId = data.job_id;
      setStatus('running', `${labels[actionId]} 実行中`, '0 行');

      // SSE でログをリアルタイム受信
      currentEs = new EventSource(`/stream/${jobId}`);

      currentEs.onmessage = (e) => {
        const line = e.data;
        appendLog(line, classifyLine(line));
      };

      currentEs.addEventListener('close', () => {
        currentEs.close();
        currentEs = null;
        setButtonsDisabled(false);
        const lastLines = logEl.innerText;
        if (/❌|エラー|error|FAIL|traceback/i.test(lastLines.slice(-400))) {
          setStatus('error', '❌ エラーで終了しました', `${logLineCount} 行`);
        } else {
          setStatus('done', '✅ 完了しました', `${logLineCount} 行`);
        }
      });

      currentEs.onerror = (e) => {
        // SSE が正常終了（close イベント後）でも onerror が発火する場合がある
        if (!currentEs) return;
        currentEs.close();
        currentEs = null;
        setButtonsDisabled(false);
        setStatus('error', '接続エラー（サーバーが停止している可能性があります）', '');
      };
    }
  </script>
</body>
</html>
